<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/sayro/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="VoiceGen AI — Turn any text into lifelike speech instantly. 200+ AI voices, 50+ languages, studio quality." />
  <title>VoiceGen AI — AI Text-to-Speech</title>
  <!-- GitHub Pages SPA redirect handler -->
  <script>
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
</head>

<body>
  <div id="root"></div>
  <!-- Puter.js: free, serverless AI (TTS powered by AWS Polly / OpenAI) -->
  <script src="https://js.puter.com/v2/"></script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
